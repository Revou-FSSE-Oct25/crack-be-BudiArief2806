version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: diabstrok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diabstrok
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: diabstrok-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/diabstrok?schema=public
      JWT_SECRET: diabstrok-super-secret
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"

volumes:
  postgres_data:
